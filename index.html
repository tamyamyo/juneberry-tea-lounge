<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juneberry Tea Lounge — Coming Soon</title>
    <meta name="description" content="Juneberry Tea Lounge — a refined tea lounge for slow sips, soft conversations, and crafted drinks. Opening in Rancho Cordova, Spring 2026.">
    <meta name="robots" content="noindex">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            color: #f5f3f0;
            background:
                radial-gradient(ellipse at top, rgba(201, 169, 97, 0.08) 0%, transparent 50%),
                linear-gradient(135deg, #1a3a2a 0%, #0f2817 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            overflow-x: hidden;
        }
        .container { max-width: 640px; }
        .eyebrow {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .eyebrow span {
            width: 36px;
            height: 1px;
            background: #c9a961;
            opacity: 0.6;
        }
        .eyebrow em {
            font-style: normal;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #c9a961;
        }
        .logo {
            width: 160px;
            height: auto;
            margin: 0 auto 2rem;
            display: block;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 400;
            font-style: italic;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 1.3;
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.7;
            opacity: 0.85;
            max-width: 480px;
            margin: 0 auto 2.5rem;
        }
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 2.5rem 0;
        }
        .divider span {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, #c9a961, transparent);
        }
        .divider em {
            font-style: normal;
            color: #c9a961;
            font-size: 0.9rem;
        }
        .details {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(245, 243, 240, 0.6);
            margin-bottom: 2.5rem;
        }
        .details strong {
            display: block;
            color: #c9a961;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
            text-align: center;
        }
        @media (max-width: 480px) {
            .details-grid { grid-template-columns: 1fr; gap: 1.5rem; }
        }
        .newsletter {
            margin-top: 2rem;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .newsletter input {
            min-width: 220px;
            padding: 0.85rem 1.2rem;
            border: 1px solid rgba(201, 169, 97, 0.4);
            background: rgba(255, 255, 255, 0.05);
            color: #f5f3f0;
            font-family: inherit;
            font-size: 0.9rem;
            border-radius: 1px;
        }
        .newsletter input::placeholder { color: rgba(245, 243, 240, 0.4); }
        .newsletter input:focus { outline: none; border-color: #c9a961; }
        .newsletter button {
            padding: 0.85rem 1.8rem;
            border: 1.5px solid #c9a961;
            background: #c9a961;
            color: #0f2817;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.3s ease;
        }
        .newsletter button:hover { background: #d4b876; border-color: #d4b876; }
        .footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(245, 243, 240, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="eyebrow">
            <span></span><em>Rancho Cordova &middot; Spring 2026</em><span></span>
        </div>

        <!-- CUSTOMIZATION POINT: Replace with hosted logo URL or local /test/logo-dark.svg path -->
        <img src="test/logo-dark.svg" alt="Juneberry Tea Lounge" class="logo">

        <h1>A refined tea lounge for slow sips, soft conversations, and crafted drinks.</h1>

        <p>Crafted teas, layered milk drinks, fruit infusions, and quiet lounge moments. Opening soon in Rancho Cordova.</p>

        <div class="divider"><span></span><em>&#x2766;</em><span></span></div>

        <div class="details-grid">
            <div class="details">
                <strong>Opening</strong>
                Spring 2026
            </div>
            <div class="details">
                <strong>Location</strong>
                Rancho Cordova, CA
            </div>
        </div>

        <!-- CUSTOMIZATION POINT: Replace with a real newsletter handler (Mailchimp, ConvertKit, etc.) -->
        <form class="newsletter" onsubmit="event.preventDefault(); this.querySelector('input').value=''; this.querySelector('button').textContent='Thank you'; setTimeout(()=>this.querySelector('button').textContent='Notify Me', 3000);">
            <input type="email" placeholder="your@email.com" required>
            <button type="submit">Notify Me</button>
        </form>

        <div class="footer">&copy; 2026 Juneberry Tea Lounge</div>
    </div>
</body>
</html>
