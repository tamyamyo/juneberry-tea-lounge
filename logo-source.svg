<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Juneberry Tea Lounge Logo</title>
  <desc id="desc">Elegant black, gold, and forest green Juneberry Tea Lounge logo with a gold J monogram and a small botanical juneberry sprig.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7E6B0"/>
      <stop offset="0.38" stop-color="#D6AF55"/>
      <stop offset="0.72" stop-color="#A97824"/>
      <stop offset="1" stop-color="#F4D88B"/>
    </linearGradient>
    <linearGradient id="softGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF0BF"/>
      <stop offset="1" stop-color="#B88735"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6E7B49"/>
      <stop offset="1" stop-color="#172B1C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <style>
      .gold-stroke{fill:none;stroke:url(#gold);stroke-width:3;stroke-linecap:round;opacity:.95}
      .thin-gold{fill:none;stroke:url(#softGold);stroke-width:2;stroke-linecap:round}
      .stem{fill:none;stroke:#c8a35a;stroke-width:3;stroke-linecap:round}
      .leaf-vein{fill:none;stroke:#c6a35d;stroke-width:1.1;opacity:.75}
      .word{font-family:Cinzel, Trajan Pro, Georgia, serif;letter-spacing:32px;fill:url(#gold)}
      .sub{font-family:Cinzel, Trajan Pro, Georgia, serif;letter-spacing:16px;fill:url(#softGold)}
    </style>
  </defs>
  <rect width="1254" height="1254" fill="#050505"/>

  <!-- emblem ring -->
  <path class="gold-stroke" d="M 424 704 A 286 286 0 0 1 642 286"/>
  <path class="gold-stroke" d="M 773 302 A 286 286 0 0 1 705 812"/>

  <!-- J monogram -->
  <text x="627" y="748" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="650" font-weight="700" fill="url(#gold)" filter="url(#shadow)">J</text>
  <text x="627" y="748" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="650" font-weight="700" fill="none" stroke="#f6dfa0" stroke-width="1.4" opacity="0.55">J</text>

  <!-- smaller botanical juneberry sprig -->
  <g transform="translate(0,0)" filter="url(#shadow)">
    <path class="stem" d="M 505 724 C 555 700, 592 655, 636 588 C 654 560, 665 542, 682 520"/>
    <path class="stem" d="M 581 658 C 559 623, 546 604, 533 582"/>
    <path class="stem" d="M 612 620 C 590 588, 582 565, 579 545"/>
    <path class="stem" d="M 636 590 C 673 597, 697 610, 716 632"/>
    <path class="stem" d="M 640 585 C 666 562, 681 549, 699 540"/>

    <!-- leaves -->
    <g>
      <ellipse cx="546" cy="695" rx="18" ry="42" fill="url(#leaf)" transform="rotate(-55 546 695)"/>
      <path class="leaf-vein" d="M 519 717 C 539 697, 553 681, 571 666"/>
      <ellipse cx="590" cy="650" rx="20" ry="48" fill="url(#leaf)" transform="rotate(-35 590 650)"/>
      <path class="leaf-vein" d="M 574 687 C 584 657, 594 632, 606 610"/>
      <ellipse cx="628" cy="661" rx="18" ry="43" fill="url(#leaf)" transform="rotate(68 628 661)"/>
      <path class="leaf-vein" d="M 595 647 C 620 657, 641 668, 663 680"/>
      <ellipse cx="536" cy="587" rx="15" ry="39" fill="url(#leaf)" transform="rotate(-42 536 587)"/>
      <path class="leaf-vein" d="M 520 616 C 531 592, 542 572, 554 554"/>
      <ellipse cx="668" cy="548" rx="14" ry="34" fill="url(#leaf)" transform="rotate(38 668 548)"/>
      <path class="leaf-vein" d="M 654 525 C 665 544, 674 562, 683 580"/>
    </g>

    <!-- berries -->
    <g>
      <circle cx="603" cy="714" r="17" fill="#273724" stroke="#b99045" stroke-width="1.2"/>
      <circle cx="636" cy="700" r="16" fill="#273724" stroke="#b99045" stroke-width="1.2"/>
      <circle cx="686" cy="622" r="16" fill="#273724" stroke="#b99045" stroke-width="1.2"/>
      <circle cx="706" cy="651" r="17" fill="#273724" stroke="#b99045" stroke-width="1.2"/>
      <g stroke="#caa456" stroke-width="1.3" stroke-linecap="round">
        <path d="M598 714 l-7 -5 M598 714 l-2 8 M598 714 l8 -4"/>
        <path d="M636 700 l-7 -5 M636 700 l-1 8 M636 700 l8 -3"/>
        <path d="M686 622 l-7 -4 M686 622 l-2 8 M686 622 l8 -4"/>
        <path d="M706 651 l-7 -4 M706 651 l-2 8 M706 651 l8 -4"/>
      </g>
    </g>

    <!-- small flower and buds -->
    <g transform="translate(680 575)">
      <g fill="#F4E8C6" stroke="#caa456" stroke-width="1.2">
        <ellipse cx="0" cy="-16" rx="9" ry="17"/>
        <ellipse cx="15" cy="-4" rx="9" ry="17" transform="rotate(72 15 -4)"/>
        <ellipse cx="9" cy="13" rx="9" ry="17" transform="rotate(144 9 13)"/>
        <ellipse cx="-9" cy="13" rx="9" ry="17" transform="rotate(216 -9 13)"/>
        <ellipse cx="-15" cy="-4" rx="9" ry="17" transform="rotate(288 -15 -4)"/>
      </g>
      <circle cx="0" cy="0" r="5" fill="#b88d3a"/>
      <g stroke="#8c6a2c" stroke-width="1" stroke-linecap="round">
        <path d="M0 0 L0 -8"/><path d="M0 0 L7 -3"/><path d="M0 0 L5 6"/><path d="M0 0 L-5 6"/><path d="M0 0 L-7 -3"/>
      </g>
    </g>
    <g fill="#F2E5BE" stroke="#caa456" stroke-width="1.2">
      <ellipse cx="646" cy="524" rx="8" ry="17" transform="rotate(-18 646 524)"/>
      <ellipse cx="625" cy="552" rx="8" ry="16" transform="rotate(-25 625 552)"/>
      <ellipse cx="665" cy="535" rx="7" ry="14" transform="rotate(28 665 535)"/>
    </g>
  </g>

  <!-- wordmark -->
  <text class="word" x="627" y="935" text-anchor="middle" font-size="86">JUNEBERRY</text>
  <line x1="350" y1="1005" x2="588" y2="1005" stroke="#3D5A3E" stroke-width="3" stroke-linecap="round"/>
  <line x1="666" y1="1005" x2="904" y2="1005" stroke="#3D5A3E" stroke-width="3" stroke-linecap="round"/>
  <g transform="translate(627 1005)" fill="url(#gold)">
    <path d="M-22 0 C-6 -15, 5 -18, 23 -16 C9 -6,-5 -1,-22 0Z"/>
    <path d="M-18 5 C-2 1, 11 5, 25 16 C6 18,-7 14,-18 5Z"/>
    <path d="M-3 -3 C7 -10, 18 -12, 34 -10 C20 -2,11 1,-3 -3Z"/>
    <path d="M-34 9 C-20 1,-9 1,3 7 C-10 15,-23 16,-34 9Z"/>
  </g>
  <text class="sub" x="627" y="1075" text-anchor="middle" font-size="44">TEA LOUNGE</text>
</svg>
